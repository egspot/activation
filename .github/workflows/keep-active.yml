name: Keep Repo Active

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update timestamp
        run: |
          echo "Last auto-update: $(date)" > .github/last-active.txt
          git config user.email "info@egspot.com"
          git config user.name "EGSPOT Bot"
          git add .github/last-active.txt
          git commit -m "chore: keep repo active"
          git push
