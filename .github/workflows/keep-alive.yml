name: Server Heartbeat

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping EGSPOT License Server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://activation.egspot.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Server DOWN — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Server OK — HTTP $STATUS"
